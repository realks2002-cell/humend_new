<!DOCTYPE html>
<html>
<head><style>
body { margin: 0; padding: 10px; background: #333; }
#coords { position: fixed; top: 0; left: 0; background: rgba(0,0,0,0.8); color: #0f0;
  padding: 8px 16px; font: 16px monospace; z-index: 999; pointer-events: none; }
img { display: block; cursor: crosshair; }
</style></head>
<body>
<div id="coords">Move mouse over image</div>
<img id="img" />
<script>
const params = new URLSearchParams(location.search);
const file = params.get('f');
const img = document.getElementById('img');
img.src = file;
img.onload = () => {
  document.getElementById('coords').textContent =
    `${file} - Natural: ${img.naturalWidth}x${img.naturalHeight}`;
};
img.onmousemove = (e) => {
  const rect = img.getBoundingClientRect();
  const scaleX = img.naturalWidth / rect.width;
  const scaleY = img.naturalHeight / rect.height;
  const x = Math.round((e.clientX - rect.left) * scaleX);
  const y = Math.round((e.clientY - rect.top) * scaleY);
  document.getElementById('coords').textContent =
    `${file} (${img.naturalWidth}x${img.naturalHeight}) | x=${x}, y=${y}`;
};
</script>
</body>
</html>
